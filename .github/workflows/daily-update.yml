# ============================================================================
# AI 热点追踪 - 每日自动更新工作流
# 功能：每天定时运行 Python 采集脚本，并将生成的数据提交到仓库
# Vercel 检测到仓库更新后会自动触发重新部署
# ============================================================================

name: 每日数据更新

on:
  # 定时触发：每天北京时间 10:00 和 18:00 执行
  # GitHub Actions 使用 UTC 时间，北京时间 = UTC + 8
  # 所以 2:00 UTC = 10:00 CST, 10:00 UTC = 18:00 CST
  schedule:
    - cron: '0 2,10 * * *'

  # 手动触发：可从 GitHub Actions 页面手动运行
  workflow_dispatch:

  # 代码推送时触发（方便测试）
  push:
    branches: [ main, master ]
    paths:
      - 'scripts/**'

jobs:
  # 数据采集任务
  collect-data:
    name: 采集并处理数据
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          # 需要获取完整提交历史，以便后续提交
          fetch-depth: 0

      # 2. 设置 Python 环境
      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 3. 安装 Python 依赖
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 运行采集与处理脚本
      - name: 运行数据采集脚本
        env:
          # 百度翻译 API 密钥（从 GitHub Secrets 中读取）
          BAIDU_APPID: ${{ secrets.BAIDU_APPID }}
          BAIDU_SECRET_KEY: ${{ secrets.BAIDU_SECRET_KEY }}
        run: |
          cd scripts
          python run_all.py --output-dir ../frontend/public/data

      # 5. 检查数据是否生成成功
      - name: 检查数据文件
        run: |
          echo "=== 数据文件列表 ==="
          ls -la frontend/public/data/
          echo ""
          echo "=== 文件大小 ==="
          for f in frontend/public/data/*.json; do
            size=$(wc -c < "$f")
            echo "  $f: $(numfmt --to=iec $size) ($size bytes)"
          done

      # 6. 提交数据变更到仓库
      # 注意：这会触发 Vercel 自动重新部署
      - name: 提交数据更新
        run: |
          git config --local user.name "AI News Bot"
          git config --local user.email "bot@ai-news-tracker.vercel.app"

          # 添加数据文件
          git add frontend/public/data/*.json data/ 2>/dev/null || true

          # 检查是否有变更
          if git diff --staged --quiet; then
            echo "没有数据变更，跳过提交"
          else
            git commit -m "📊 每日数据更新 $(date '+%Y-%m-%d %H:%M')"
            git push
            echo "数据更新已提交"
          fi
        env:
          # 使用 GitHub Token 进行推送
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 可选：如果 Vercel 部署需要手动触发，可以使用 webhook
  # 取消注释下面的代码并配置 secrets.VERCEL_WEBHOOK_URL 即可启用
  # notify-vercel:
